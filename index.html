<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive Rubik's Cube</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #111; overflow: hidden; font-family: sans-serif; }
    canvas { display: block; touch-action: none; }
    #ui {
      position: fixed;
      top: 20px;
      right: 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    button {
      padding: 12px 24px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
      letter-spacing: 0.5px;
    }
    #scrambleBtn { background: #e67e22; color: #fff; }
    #scrambleBtn:hover:not(:disabled) { background: #f39c12; }
    #solveBtn { background: #27ae60; color: #fff; }
    #solveBtn:hover:not(:disabled) { background: #2ecc71; }
    button:disabled { opacity: 0.4; cursor: not-allowed; }
    #dmBtn { background: #8e44ad; color: #fff; }
    #dmBtn:hover:not(:disabled) { background: #9b59b6; }
    #dmBtn.active { background: #c0392b; }
    #dmBtn.active:hover:not(:disabled) { background: #e74c3c; }
    #sizeControl {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      background: #222;
      border-radius: 8px;
      padding: 6px 10px;
    }
    #sizeControl button {
      padding: 6px 14px;
      font-size: 18px;
      background: #444;
      color: #fff;
      border-radius: 6px;
    }
    #sizeControl button:hover:not(:disabled) { background: #666; }
    #sizeLabel {
      color: #ddd;
      font-size: 15px;
      font-weight: 600;
      min-width: 36px;
      text-align: center;
    }
    #hint {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #555;
      font-size: 13px;
      pointer-events: none;
      text-align: center;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div id="ui">
    <button id="scrambleBtn">Scramble</button>
    <button id="solveBtn">Solve</button>
    <button id="dmBtn">Take Apart</button>
    <div id="sizeControl">
      <button id="sizeMinusBtn">−</button>
      <span id="sizeLabel">3×3</span>
      <button id="sizePlusBtn">+</button>
    </div>
  </div>
  <div id="hint">Drag to orbit &nbsp;|&nbsp; Click arrows to rotate layers</div>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
  <script>
  (function () {
    // ── CONSTANTS ──────────────────────────────────────────────────────────────
    const COLORS = {
      WHITE:  0xffffff,
      YELLOW: 0xffdd00,
      RED:    0xee1111,
      ORANGE: 0xff8800,
      BLUE:   0x1155ee,
      GREEN:  0x22aa22,
      BLACK:  0x111111,
    };
    const COLOR_SCHEMES = [
      // Classic
      { right: 0x1155ee, left: 0x22aa22, top: 0xffffff, bottom: 0xffdd00, front: 0xee1111, back: 0xff8800 },
      // Pastel
      { right: 0x6EC6F5, left: 0x77DD77, top: 0xFFFFFF, bottom: 0xFFDAB9, front: 0xFF9AA2, back: 0xB39DDB },
      // Neon
      { right: 0x00FFFF, left: 0x39FF14, top: 0xFFFFFF, bottom: 0xFFFF00, front: 0xFF073A, back: 0xFF6600 },
    ];
    let schemeIdx = 0;

    const ANIM_SPEED_SCRAMBLE = 0.08;
    const ANIM_SPEED_MANUAL   = 0.05;
    const ANIM_SPEED_SOLVE    = 0.05;
    const CUBIE_SIZE      = 0.92;
    const CUBIE_GAP       = 1.0;
    const CLICK_THRESHOLD = 6;
    const MIN_SIZE        = 2;
    const MAX_SIZE        = 6;

    // 6 face configs: local normal/up/right for each cube face.
    const FACE_CONFIGS = [
      { normal: new THREE.Vector3( 0, 0, 1), up: new THREE.Vector3( 0, 1, 0), right: new THREE.Vector3( 1, 0, 0) },
      { normal: new THREE.Vector3( 0, 0,-1), up: new THREE.Vector3( 0, 1, 0), right: new THREE.Vector3(-1, 0, 0) },
      { normal: new THREE.Vector3( 1, 0, 0), up: new THREE.Vector3( 0, 1, 0), right: new THREE.Vector3( 0, 0,-1) },
      { normal: new THREE.Vector3(-1, 0, 0), up: new THREE.Vector3( 0, 1, 0), right: new THREE.Vector3( 0, 0, 1) },
      { normal: new THREE.Vector3( 0, 1, 0), up: new THREE.Vector3( 0, 0,-1), right: new THREE.Vector3( 1, 0, 0) },
      { normal: new THREE.Vector3( 0,-1, 0), up: new THREE.Vector3( 0, 0, 1), right: new THREE.Vector3( 1, 0, 0) },
    ];

    // ── THREE.JS SETUP ─────────────────────────────────────────────────────────
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(window.devicePixelRatio);
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.body.appendChild(renderer.domElement);

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x111111);

    const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
    camera.position.set(4, 4, 7);
    camera.lookAt(0, 0, 0);

    scene.add(new THREE.AmbientLight(0xffffff, 0.6));
    const dirLight = new THREE.DirectionalLight(0xffffff, 0.9);
    dirLight.position.set(5, 10, 7);
    scene.add(dirLight);

    const cubeGroup = new THREE.Group();
    scene.add(cubeGroup);

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    // ── SNAP TARGET QUATERNIONS ────────────────────────────────────────────────
    // Precompute the cubeGroup quaternion that puts each face head-on to camera.
    // Camera direction stays constant across sizes (only distance changes), so
    // these only need to be computed once.
    (function computeSnapTargets() {
      const camDir = camera.position.clone().normalize();
      const worldUp = new THREE.Vector3(0, 1, 0);
      const tRight = new THREE.Vector3().crossVectors(camDir, worldUp).normalize();
      const tUp    = new THREE.Vector3().crossVectors(tRight, camDir).normalize();
      const tgtMat = new THREE.Matrix4().makeBasis(tRight, tUp, camDir);
      FACE_CONFIGS.forEach(fc => {
        const srcMat  = new THREE.Matrix4().makeBasis(fc.right, fc.up, fc.normal);
        const combined = tgtMat.clone().multiply(srcMat.clone().invert());
        fc.targetQuat = new THREE.Quaternion().setFromRotationMatrix(combined);
      });
    })();

    // ── CUBE STATE ─────────────────────────────────────────────────────────────
    let cubeSize = 3;
    const cubies = [];

    // Returns the layer positions for an N-size cube: e.g. N=3 → [-1, 0, 1], N=4 → [-1.5, -0.5, 0.5, 1.5]
    function getLayers(N) {
      const offset = (N - 1) / 2;
      return Array.from({ length: N }, (_, i) => -offset + i);
    }

    function makeMaterials(ix, iy, iz, N) {
      const e = (N - 1) / 2;
      return [
        new THREE.MeshLambertMaterial({ color: Math.abs(ix - e) < 0.1 ? COLORS.BLUE   : COLORS.BLACK }),
        new THREE.MeshLambertMaterial({ color: Math.abs(ix + e) < 0.1 ? COLORS.GREEN  : COLORS.BLACK }),
        new THREE.MeshLambertMaterial({ color: Math.abs(iy - e) < 0.1 ? COLORS.WHITE  : COLORS.BLACK }),
        new THREE.MeshLambertMaterial({ color: Math.abs(iy + e) < 0.1 ? COLORS.YELLOW : COLORS.BLACK }),
        new THREE.MeshLambertMaterial({ color: Math.abs(iz - e) < 0.1 ? COLORS.RED    : COLORS.BLACK }),
        new THREE.MeshLambertMaterial({ color: Math.abs(iz + e) < 0.1 ? COLORS.ORANGE : COLORS.BLACK }),
      ];
    }

    function buildCube(N) {
      cubies.forEach(c => cubeGroup.remove(c.mesh));
      cubies.length = 0;
      const geo    = new THREE.BoxGeometry(CUBIE_SIZE, CUBIE_SIZE, CUBIE_SIZE);
      const layers = getLayers(N);
      for (const ix of layers)
        for (const iy of layers)
          for (const iz of layers) {
            const mesh = new THREE.Mesh(geo, makeMaterials(ix, iy, iz, N));
            mesh.position.set(ix * CUBIE_GAP, iy * CUBIE_GAP, iz * CUBIE_GAP);
            cubeGroup.add(mesh);
            cubies.push({ mesh });
          }
    }

    // ── ARROW CONTROLS ─────────────────────────────────────────────────────────
    let arrowMeshes   = [];
    let currentArrows = { top: [], bottom: [], left: [], right: [] };
    const arrowToMove = new Map();

    // Pre-render arrow textures once; reused across all sizes.
    const arrowTextures = (() => {
      function make(symbol) {
        const c = document.createElement('canvas');
        c.width = c.height = 128;
        const ctx = c.getContext('2d');
        // Dark backing circle — contrasts against both the black scene and
        // any coloured cube face.
        ctx.fillStyle = 'rgba(0,0,0,0.55)';
        ctx.beginPath();
        ctx.arc(64, 64, 58, 0, Math.PI * 2);
        ctx.fill();
        // Solid white arrow with a subtle dark shadow for extra pop.
        ctx.shadowColor   = 'rgba(0,0,0,0.9)';
        ctx.shadowBlur    = 8;
        ctx.fillStyle     = '#00e5ff';
        ctx.font          = 'bold 84px sans-serif';
        ctx.textAlign     = 'center';
        ctx.textBaseline  = 'middle';
        ctx.fillText(symbol, 64, 70);
        return new THREE.CanvasTexture(c);
      }
      return {
        top:    make('\u25B2'),
        bottom: make('\u25BC'),
        left:   make('\u25C4'),
        right:  make('\u25BA'),
      };
    })();

    function rebuildArrows(N) {
      arrowMeshes.forEach(m => cubeGroup.remove(m));
      arrowMeshes   = [];
      arrowToMove.clear();
      currentArrows = { top: [], bottom: [], left: [], right: [] };

      // Shrink arrow size for larger cubes so they don't crowd each other.
      const arrowSize = Math.min(0.90, 0.55 * N / 3);
      const geo = new THREE.PlaneGeometry(arrowSize, arrowSize);

      for (const edge of ['top', 'bottom', 'left', 'right']) {
        for (let i = 0; i < N; i++) {
          const mat  = new THREE.MeshBasicMaterial({
            map: arrowTextures[edge],
            transparent: true,
            side: THREE.DoubleSide,
            depthWrite: false,
          });
          const mesh = new THREE.Mesh(geo, mat);
          mesh.visible = false;
          cubeGroup.add(mesh);
          currentArrows[edge].push(mesh);
          arrowMeshes.push(mesh);
        }
      }
    }

    function positionArrows(fc) {
      const { normal, up, right } = fc;
      arrowToMove.clear();

      const arrowQuat = new THREE.Quaternion().setFromUnitVectors(
        new THREE.Vector3(0, 0, 1), normal
      );

      const rLetter = right.x !== 0 ? 'x' : right.y !== 0 ? 'y' : 'z';
      const rSign   = right[rLetter];
      const uLetter = up.x    !== 0 ? 'x' : up.y    !== 0 ? 'y' : 'z';
      const uSign   = up[uLetter];

      const layers    = getLayers(cubeSize);
      // Distance from cube centre to the arrow row/column perimeter.
      const perimDist = (cubeSize - 1) / 2 + 0.8;

      function place(mesh, pos, move) {
        mesh.position.copy(pos);
        mesh.quaternion.copy(arrowQuat);
        mesh.visible = true;
        arrowToMove.set(mesh, move);
      }

      // Top ▲ — one per column, push column upward
      layers.forEach((c, i) => {
        const pos = normal.clone().multiplyScalar(0.1)
          .add(right.clone().multiplyScalar(c))
          .add(up.clone().multiplyScalar(perimDist));
        place(currentArrows.top[i], pos, { axis: rLetter, layer: c * rSign, dir: -rSign });
      });

      // Bottom ▼ — one per column, push column downward
      layers.forEach((c, i) => {
        const pos = normal.clone().multiplyScalar(0.1)
          .add(right.clone().multiplyScalar(c))
          .add(up.clone().multiplyScalar(-perimDist));
        place(currentArrows.bottom[i], pos, { axis: rLetter, layer: c * rSign, dir: rSign });
      });

      // Left ◄ — one per row, push row leftward (displayed top-to-bottom)
      [...layers].reverse().forEach((r, i) => {
        const pos = normal.clone().multiplyScalar(0.1)
          .add(right.clone().multiplyScalar(-perimDist))
          .add(up.clone().multiplyScalar(r));
        place(currentArrows.left[i], pos, { axis: uLetter, layer: r * uSign, dir: -uSign });
      });

      // Right ► — one per row, push row rightward
      [...layers].reverse().forEach((r, i) => {
        const pos = normal.clone().multiplyScalar(0.1)
          .add(right.clone().multiplyScalar(perimDist))
          .add(up.clone().multiplyScalar(r));
        place(currentArrows.right[i], pos, { axis: uLetter, layer: r * uSign, dir: uSign });
      });
    }

    function updateArrows() {
      const cur = cubeGroup.quaternion;
      let bestDot = -1, bestFC = null;
      FACE_CONFIGS.forEach(fc => {
        const d = Math.abs(cur.dot(fc.targetQuat));
        if (d > bestDot) { bestDot = d; bestFC = fc; }
      });
      positionArrows(bestFC);
    }

    // ── MOVE ENGINE ────────────────────────────────────────────────────────────
    const moveHistory = [];
    const moveQueue   = [];
    let   currentAnim = null;
    let   animSpeed   = ANIM_SPEED_SCRAMBLE;

    // Tolerance-based layer lookup — handles both integer (odd N) and
    // half-integer (even N) positions correctly.
    function getCubiesInLayer(axis, layer) {
      return cubies.filter(c => Math.abs(c.mesh.position[axis] - layer) < 0.1);
    }

    function easeInOut(t) {
      return t < 0.5 ? 2 * t * t : -1 + (4 - 2 * t) * t;
    }

    function startMoveAnimation(move) {
      const { axis, layer, dir } = move;
      const layerCubies = getCubiesInLayer(axis, layer);
      const pivot = new THREE.Group();
      cubeGroup.add(pivot);
      layerCubies.forEach(c => pivot.attach(c.mesh));
      const startQuat = pivot.quaternion.clone();
      const endQuat   = new THREE.Quaternion();
      const axisVec   = new THREE.Vector3(
        axis === 'x' ? 1 : 0,
        axis === 'y' ? 1 : 0,
        axis === 'z' ? 1 : 0,
      );
      endQuat.setFromAxisAngle(axisVec, dir * Math.PI / 2);
      currentAnim = { pivot, startQuat, endQuat, progress: 0, cubies: layerCubies };
    }

    function finalizeMove() {
      const { pivot, cubies: layerCubies } = currentAnim;
      pivot.quaternion.copy(currentAnim.endQuat);
      pivot.updateMatrixWorld();
      layerCubies.forEach(c => {
        cubeGroup.attach(c.mesh);
        const p = c.mesh.position;
        // Round to nearest 0.5 — works for both integer (odd N) and
        // half-integer (even N) layer positions.
        p.set(
          Math.round(p.x * 2) / 2,
          Math.round(p.y * 2) / 2,
          Math.round(p.z * 2) / 2,
        );
      });
      cubeGroup.remove(pivot);
      currentAnim = null;
    }

    function processQueue() {
      if (currentAnim || moveQueue.length === 0) return;
      const move = moveQueue.shift();
      startMoveAnimation(move);
      updateButtons();
    }

    function enqueueMove(move, recordHistory) {
      moveQueue.push(move);
      if (recordHistory) moveHistory.push(move);
    }

    // ── SCRAMBLE / SOLVE ───────────────────────────────────────────────────────
    const AXES = ['x', 'y', 'z'];

    function scramble() {
      const layers = getLayers(cubeSize);
      // Scale move count with cube complexity.
      const n = cubeSize * cubeSize * 2;
      animSpeed = ANIM_SPEED_SCRAMBLE;
      for (let i = 0; i < n; i++) {
        enqueueMove({
          axis:  AXES[Math.floor(Math.random() * 3)],
          layer: layers[Math.floor(Math.random() * layers.length)],
          dir:   Math.random() < 0.5 ? 1 : -1,
        }, true);
      }
      updateButtons();
    }

    function solve() {
      if (moveHistory.length === 0) return;
      animSpeed = ANIM_SPEED_SOLVE;
      const solveMoves = moveHistory.slice().reverse().map(m => ({
        axis: m.axis, layer: m.layer, dir: -m.dir,
      }));
      moveHistory.length = 0;
      solveMoves.forEach(m => enqueueMove(m, false));
      updateButtons();
    }

    // ── DISASSEMBLE MODE ───────────────────────────────────────────────────────
    const DM_SNAP_DIST  = 0.85;
    const DM_ANIM_SPEED = 0.07;

    let disassembleMode = false;
    const dmSlots  = [];   // { homePos, occupant }
    let   dmGhosts = [];   // node-point spheres, one per slot
    const dmAnims  = [];   // { cubie, from, to, progress, onDone }

    let dmDragCubie     = null;
    let dmDragPlane     = null;
    let dmDragLocalOff  = null;
    let dmPotentialGrab = null;
    let dmHoveredCubie  = null;
    let dmSnapIdx       = -1;

    function dmAddAnim(cubie, toPos, onDone) {
      const existing = dmAnims.findIndex(a => a.cubie === cubie);
      if (existing >= 0) dmAnims.splice(existing, 1);
      dmAnims.push({ cubie, from: cubie.mesh.position.clone(), to: toPos.clone(), progress: 0, onDone: onDone || null });
    }

    function dmTickAnims() {
      for (let i = dmAnims.length - 1; i >= 0; i--) {
        const a = dmAnims[i];
        a.progress += DM_ANIM_SPEED;
        const t = easeInOut(Math.min(a.progress, 1));
        a.cubie.mesh.position.lerpVectors(a.from, a.to, t);
        if (a.progress >= 1) {
          a.cubie.mesh.position.copy(a.to);
          if (a.onDone) a.onDone();
          dmAnims.splice(i, 1);
        }
      }
      // Pulse idle node points
      const pulse = 1 + 0.18 * Math.sin(Date.now() * 0.004);
      dmGhosts.forEach((g, i) => {
        if (!g.visible || i === dmSnapIdx) return;
        g.scale.setScalar(pulse);
      });
    }

    function dmNearestEmptySlot(localPos, maxDist) {
      let best = null, bestDist = maxDist !== undefined ? maxDist : Infinity;
      dmSlots.forEach((s, i) => {
        if (s.occupant !== null) return;
        const d = localPos.distanceTo(s.homePos);
        if (d < bestDist) { bestDist = d; best = i; }
      });
      return best;
    }

    function dmPullOut(cubie) {
      const si = cubie.slotIndex;
      if (si >= 0) { dmSlots[si].occupant = null; dmGhosts[si].visible = true; }
      cubie.isFloating = true;
      cubie.slotIndex  = -1;
      const homePos = si >= 0 ? dmSlots[si].homePos.clone() : cubie.mesh.position.clone();
      const outDir  = homePos.clone().normalize();
      if (outDir.lengthSq() < 0.001) outDir.set(1, 1, 1).normalize();
      const pullDist = (cubeSize - 1) / 2 + 2.5;
      dmAddAnim(cubie, homePos.clone().addScaledVector(outDir, pullDist));
    }

    function dmPlaceCubie(cubie, slotIdx) {
      const slot     = dmSlots[slotIdx];
      slot.occupant  = cubie;
      cubie.slotIndex  = slotIdx;
      cubie.isFloating = false;
      dmGhosts[slotIdx].visible = false;
      dmAddAnim(cubie, slot.homePos, () => { cubie.mesh.position.copy(slot.homePos); });
    }

    function dmHandleClick(cubie) {
      cubie.mesh.scale.setScalar(1);
      if (cubie.isFloating) {
        const si = dmNearestEmptySlot(cubie.mesh.position);
        if (si !== null) dmPlaceCubie(cubie, si);
      } else {
        dmPullOut(cubie);
      }
    }

    function dmStartDrag(cubie, worldHitPoint) {
      const ai = dmAnims.findIndex(a => a.cubie === cubie);
      if (ai >= 0) dmAnims.splice(ai, 1);
      if (!cubie.isFloating) {
        const si = cubie.slotIndex;
        if (si >= 0) { dmSlots[si].occupant = null; dmGhosts[si].visible = true; }
        cubie.isFloating = true;
        cubie.slotIndex  = -1;
      }
      cubie.mesh.scale.setScalar(1);
      if (dmHoveredCubie === cubie) dmHoveredCubie = null;
      const worldPos = new THREE.Vector3();
      cubie.mesh.getWorldPosition(worldPos);
      const camDir = new THREE.Vector3();
      camera.getWorldDirection(camDir);
      dmDragPlane    = new THREE.Plane().setFromNormalAndCoplanarPoint(camDir, worldPos);
      const localHit = cubeGroup.worldToLocal(worldHitPoint.clone());
      dmDragLocalOff = new THREE.Vector3().subVectors(localHit, cubie.mesh.position);
      dmDragCubie    = cubie;
    }

    function dmUpdateDrag(clientX, clientY) {
      mouse.x =  (clientX / window.innerWidth)  * 2 - 1;
      mouse.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const worldTarget = new THREE.Vector3();
      if (!raycaster.ray.intersectPlane(dmDragPlane, worldTarget)) return;
      const localTarget = cubeGroup.worldToLocal(worldTarget.clone());
      localTarget.sub(dmDragLocalOff);
      dmDragCubie.mesh.position.copy(localTarget);
      const nearest = dmNearestEmptySlot(localTarget, DM_SNAP_DIST);
      if (nearest !== dmSnapIdx) {
        if (dmSnapIdx >= 0) {
          dmGhosts[dmSnapIdx].material.color.setHex(0x00e5ff);
          dmGhosts[dmSnapIdx].material.opacity = 0.85;
          dmGhosts[dmSnapIdx].scale.setScalar(1);
        }
        dmSnapIdx = nearest;
        if (dmSnapIdx !== null) {
          dmGhosts[dmSnapIdx].material.color.setHex(0x00ff88);
          dmGhosts[dmSnapIdx].material.opacity = 1.0;
          dmGhosts[dmSnapIdx].scale.setScalar(2.2);
        }
      }
    }

    function dmEndDrag() {
      if (!dmDragCubie) return;
      const cubie = dmDragCubie;
      dmDragCubie = null; dmDragPlane = null; dmDragLocalOff = null;
      if (dmSnapIdx >= 0 && dmSnapIdx < dmGhosts.length) {
        dmGhosts[dmSnapIdx].material.color.setHex(0x00e5ff);
        dmGhosts[dmSnapIdx].material.opacity = 0.85;
        dmGhosts[dmSnapIdx].scale.setScalar(1);
      }
      dmSnapIdx = -1;
      const si = dmNearestEmptySlot(cubie.mesh.position, DM_SNAP_DIST);
      if (si !== null) dmPlaceCubie(cubie, si);
    }

    function dmUpdateHover(clientX, clientY) {
      mouse.x =  (clientX / window.innerWidth)  * 2 - 1;
      mouse.y = -(clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(mouse, camera);
      const hits   = raycaster.intersectObjects(cubies.map(c => c.mesh));
      const newHov = hits.length > 0 ? cubies.find(c => c.mesh === hits[0].object) : null;
      if (newHov !== dmHoveredCubie) {
        if (dmHoveredCubie) dmHoveredCubie.mesh.scale.setScalar(1);
        dmHoveredCubie = newHov;
        if (dmHoveredCubie) dmHoveredCubie.mesh.scale.setScalar(1.12);
      }
    }

    function enterDM() {
      disassembleMode = true;
      arrowMeshes.forEach(m => m.visible = false);
      dmSlots.length = 0;
      cubies.forEach((c, i) => {
        c.isFloating = false;
        c.slotIndex  = i;
        dmSlots.push({ homePos: c.mesh.position.clone(), occupant: c });
      });
      const nodeGeo = new THREE.SphereGeometry(0.18, 10, 10);
      dmGhosts = [];
      dmSlots.forEach(slot => {
        const mat = new THREE.MeshBasicMaterial({ color: 0x00e5ff, transparent: true, opacity: 0.85 });
        const m = new THREE.Mesh(nodeGeo, mat);
        m.position.copy(slot.homePos);
        m.visible = false;
        cubeGroup.add(m);
        dmGhosts.push(m);
      });
      document.getElementById('hint').innerHTML =
        'Click a piece to pull it out &nbsp;|&nbsp; Drag to reposition &nbsp;|&nbsp; Drop near a slot to snap in &nbsp;|&nbsp; Drag empty space to orbit';
      document.getElementById('dmBtn').textContent = 'Put Together';
      document.getElementById('dmBtn').classList.add('active');
      updateButtons();
    }

    function exitDM() {
      dmAnims.length = 0;
      if (dmHoveredCubie) { dmHoveredCubie.mesh.scale.setScalar(1); dmHoveredCubie = null; }
      if (dmDragCubie)    { dmDragCubie = null; dmDragPlane = null; dmDragLocalOff = null; }
      dmPotentialGrab = null; dmSnapIdx = -1;
      cubies.filter(c => c.isFloating).forEach(c => {
        const si = dmNearestEmptySlot(c.mesh.position);
        if (si !== null) { c.mesh.position.copy(dmSlots[si].homePos); dmSlots[si].occupant = c; }
        c.isFloating = false; c.slotIndex = -1;
      });
      dmGhosts.forEach(m => cubeGroup.remove(m));
      dmGhosts = []; dmSlots.length = 0;
      disassembleMode = false;
      document.getElementById('hint').innerHTML = 'Drag to orbit &nbsp;|&nbsp; Click arrows to rotate layers';
      document.getElementById('dmBtn').textContent = 'Take Apart';
      document.getElementById('dmBtn').classList.remove('active');
      updateArrows();
      updateButtons();
    }

    // ── INIT CUBE ──────────────────────────────────────────────────────────────
    function initCube(N) {
      if (disassembleMode) exitDM();
      cubeSize = N;
      moveQueue.length   = 0;
      moveHistory.length = 0;
      currentAnim        = null;
      cubeGroup.quaternion.identity();
      if (hoveredArrow) { hoveredArrow.scale.setScalar(1.0); hoveredArrow = null; }

      buildCube(N);
      rebuildArrows(N);

      // Scale camera distance with cube size, keeping the same view angle.
      const d = 3.5 + N * 1.5;
      camera.position.set(d * 4 / 7, d * 4 / 7, d);
      camera.lookAt(0, 0, 0);

      updateArrows();
      updateSizeLabel();
      updateButtons();
    }

    // ── ORBIT + CLICK DETECTION ────────────────────────────────────────────────
    let isDragging   = false;
    let pointerStart = null;
    let prevPointer  = { x: 0, y: 0 };
    const ROT_SPEED  = 0.005;

    const raycaster = new THREE.Raycaster();
    const mouse     = new THREE.Vector2();
    let   hoveredArrow = null;

    renderer.domElement.addEventListener('pointerdown', e => {
      isDragging   = false;
      pointerStart = { x: e.clientX, y: e.clientY };
      prevPointer  = { x: e.clientX, y: e.clientY };

      if (disassembleMode) {
        mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(cubies.map(c => c.mesh));
        dmPotentialGrab = hits.length > 0
          ? { cubie: cubies.find(c => c.mesh === hits[0].object), worldHitPoint: hits[0].point.clone() }
          : null;
      }
    });

    renderer.domElement.addEventListener('pointermove', e => {
      const dx = e.clientX - prevPointer.x;
      const dy = e.clientY - prevPointer.y;
      prevPointer = { x: e.clientX, y: e.clientY };

      if (disassembleMode) {
        if (dmDragCubie) {
          dmUpdateDrag(e.clientX, e.clientY);
        } else if (dmPotentialGrab && pointerStart) {
          const dist = Math.hypot(e.clientX - pointerStart.x, e.clientY - pointerStart.y);
          if (dist >= CLICK_THRESHOLD) { dmStartDrag(dmPotentialGrab.cubie, dmPotentialGrab.worldHitPoint); isDragging = true; }
        } else {
          if (pointerStart) {
            const dist = Math.hypot(e.clientX - pointerStart.x, e.clientY - pointerStart.y);
            if (dist >= CLICK_THRESHOLD && !isDragging) isDragging = true;
          }
          if (isDragging) {
            cubeGroup.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), dx * ROT_SPEED);
            cubeGroup.rotateOnWorldAxis(new THREE.Vector3(1, 0, 0), dy * ROT_SPEED);
            cubeGroup.quaternion.normalize();
          }
        }
        if (!dmDragCubie && !isDragging) {
          dmUpdateHover(e.clientX, e.clientY);
        } else if (dmHoveredCubie) {
          dmHoveredCubie.mesh.scale.setScalar(1); dmHoveredCubie = null;
        }
        return;
      }

      // ── Normal mode ──
      if (pointerStart) {
        const dist = Math.hypot(e.clientX - pointerStart.x, e.clientY - pointerStart.y);
        if (dist >= CLICK_THRESHOLD && !isDragging) {
          isDragging = true;
          arrowMeshes.forEach(m => { m.visible = false; });
        }
      }
      if (isDragging) {
        cubeGroup.rotateOnWorldAxis(new THREE.Vector3(0, 1, 0), dx * ROT_SPEED);
        cubeGroup.rotateOnWorldAxis(new THREE.Vector3(1, 0, 0), dy * ROT_SPEED);
        cubeGroup.quaternion.normalize();
      }
      if (!isDragging) {
        mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(arrowMeshes);
        const newHov = hits.length > 0 ? hits[0].object : null;
        if (newHov !== hoveredArrow) {
          if (hoveredArrow) hoveredArrow.scale.setScalar(1.0);
          hoveredArrow = newHov;
          if (hoveredArrow) hoveredArrow.scale.setScalar(1.18);
        }
      }
    });

    renderer.domElement.addEventListener('pointerup', e => {
      const wasDrag = isDragging;
      isDragging   = false;
      pointerStart = null;

      if (disassembleMode) {
        if (dmDragCubie) { dmEndDrag(); }
        else if (!wasDrag && dmPotentialGrab) { dmHandleClick(dmPotentialGrab.cubie); }
        dmPotentialGrab = null;
        return;
      }

      if (wasDrag) {
        updateArrows();
      } else {
        mouse.x =  (e.clientX / window.innerWidth)  * 2 - 1;
        mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        raycaster.setFromCamera(mouse, camera);
        const hits = raycaster.intersectObjects(arrowMeshes);
        if (hits.length > 0) {
          const move = arrowToMove.get(hits[0].object);
          if (move && !currentAnim && moveQueue.length === 0) {
            animSpeed = ANIM_SPEED_MANUAL;
            enqueueMove(move, true);
            updateButtons();
          }
        }
      }
    });

    renderer.domElement.addEventListener('pointerleave', () => {
      if (dmDragCubie) dmEndDrag();
      if (dmHoveredCubie) { dmHoveredCubie.mesh.scale.setScalar(1); dmHoveredCubie = null; }
      dmPotentialGrab = null;
      isDragging   = false;
      pointerStart = null;
      if (hoveredArrow) { hoveredArrow.scale.setScalar(1.0); hoveredArrow = null; }
    });

    // ── UI ─────────────────────────────────────────────────────────────────────
    const scrambleBtn  = document.getElementById('scrambleBtn');
    const solveBtn     = document.getElementById('solveBtn');
    const dmBtn        = document.getElementById('dmBtn');
    const sizeMinusBtn = document.getElementById('sizeMinusBtn');
    const sizePlusBtn  = document.getElementById('sizePlusBtn');
    const sizeLabel    = document.getElementById('sizeLabel');

    function updateSizeLabel() {
      sizeLabel.textContent = `${cubeSize}\u00d7${cubeSize}`;
    }

    function updateButtons() {
      const busy = currentAnim !== null || moveQueue.length > 0;
      scrambleBtn.disabled  = busy || disassembleMode;
      solveBtn.disabled     = busy || moveHistory.length === 0 || disassembleMode;
      dmBtn.disabled        = busy;
      sizeMinusBtn.disabled = busy || disassembleMode || cubeSize <= MIN_SIZE;
      sizePlusBtn.disabled  = busy || disassembleMode || cubeSize >= MAX_SIZE;
    }

    scrambleBtn.addEventListener('click', scramble);
    solveBtn.addEventListener('click', solve);
    dmBtn.addEventListener('click', () => { if (disassembleMode) exitDM(); else enterDM(); });
    sizeMinusBtn.addEventListener('click', () => { if (cubeSize > MIN_SIZE) initCube(cubeSize - 1); });
    sizePlusBtn.addEventListener('click',  () => { if (cubeSize < MAX_SIZE) initCube(cubeSize + 1); });

    // ── MAIN LOOP ──────────────────────────────────────────────────────────────
    function tick() {
      requestAnimationFrame(tick);

      if (currentAnim) {
        currentAnim.progress += animSpeed;
        const t = easeInOut(Math.min(currentAnim.progress, 1.0));
        THREE.Quaternion.slerp(
          currentAnim.startQuat,
          currentAnim.endQuat,
          currentAnim.pivot.quaternion,
          t,
        );
        if (currentAnim.progress >= 1.0) {
          finalizeMove();
          updateButtons();
          processQueue();
        }
      } else {
        processQueue();
      }

      if (disassembleMode) dmTickAnims();

      renderer.render(scene, camera);
    }

    initCube(3);
    tick();
  })();
  </script>
</body>
</html>
