<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interactive LEGO Builder</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; overflow: hidden; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    canvas { display: block; touch-action: none; }

    #ui {
      position: fixed; top: 0; left: 0; right: 0; height: 56px;
      background: rgba(8, 8, 18, 0.9);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: center; gap: 8px;
      padding: 0 16px;
      z-index: 10;
      border-bottom: 1px solid rgba(255,255,255,0.07);
      user-select: none;
    }
    #ui-label {
      color: #ffd700;
      font-size: 13px; font-weight: 800; letter-spacing: 3px;
      text-shadow: 0 0 14px rgba(255,215,0,0.55);
      flex-shrink: 0;
    }
    .sep { width: 1px; height: 28px; background: rgba(255,255,255,0.1); margin: 0 2px; flex-shrink: 0; }
    .size-btn {
      background: rgba(255,255,255,0.07);
      color: rgba(255,255,255,0.55);
      border: 1.5px solid rgba(255,255,255,0.1);
      border-radius: 6px; padding: 4px 9px;
      cursor: pointer; font-size: 11px; font-weight: 700;
      transition: background 0.12s, color 0.12s, border-color 0.12s;
    }
    .size-btn:hover { background: rgba(255,255,255,0.15); color: #fff; }
    .size-btn.active { background: rgba(255,255,255,0.2); color: #fff; border-color: rgba(255,255,255,0.5); }
    .color-sw {
      width: 24px; height: 24px; border-radius: 50%;
      border: 2px solid rgba(255,255,255,0.07);
      cursor: pointer; flex-shrink: 0;
      transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
    }
    .color-sw:hover { transform: scale(1.2); }
    .color-sw.active { border-color: #fff; transform: scale(1.2); box-shadow: 0 0 0 2px rgba(255,255,255,0.22); }
    #clearBtn {
      margin-left: auto; flex-shrink: 0;
      background: rgba(160,25,25,0.6);
      color: #fff; border: 1.5px solid rgba(200,45,45,0.75);
      border-radius: 6px; padding: 4px 12px;
      cursor: pointer; font-size: 11px; font-weight: 700;
      transition: background 0.12s;
    }
    #clearBtn:hover { background: rgba(200,35,35,0.9); }
    #hint {
      position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
      color: rgba(255,255,255,0.25); font-size: 11px;
      pointer-events: none; white-space: nowrap;
      background: rgba(0,0,0,0.3); padding: 4px 14px; border-radius: 16px;
    }
  </style>
</head>
<body>

<div id="ui">
  <span id="ui-label">LEGO</span>
  <div class="sep"></div>
  <div id="sizeBar" style="display:flex;gap:4px;align-items:center;"></div>
  <div class="sep"></div>
  <div id="colorBar" style="display:flex;gap:5px;align-items:center;"></div>
  <button id="clearBtn">Clear All</button>
</div>

<div id="hint">
  Left-click to place &nbsp;&middot;&nbsp; Right-click to remove &nbsp;&middot;&nbsp; Left-drag to orbit &nbsp;&middot;&nbsp; Scroll to zoom
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/utils/BufferGeometryUtils.js"></script>

<script>
(function () {
  'use strict';

  // ── CONSTANTS ───────────────────────────────────────────────────────────────
  const STUD_SPACING = 1.0;
  const BRICK_HEIGHT = 3.6;   // full-height brick (3 plate heights)
  const STUD_RADIUS  = 0.24;
  const STUD_HEIGHT  = 0.18;
  const WALL_INSET   = 0.04;  // keeps brick sides from z-fighting when adjacent
  const CLICK_THRESH = 5;     // px — click vs drag discrimination
  const PLATE_HALF   = 16;    // base plate is 32x32 studs, centered at origin

  const BRICK_SIZES = [
    { label: '1x1', cols: 1, rows: 1 },
    { label: '1x2', cols: 1, rows: 2 },
    { label: '1x4', cols: 1, rows: 4 },
    { label: '2x2', cols: 2, rows: 2 },
    { label: '2x3', cols: 2, rows: 3 },
    { label: '2x4', cols: 2, rows: 4 },
  ];

  const LEGO_COLORS = [
    { name: 'Red',    hex: 0xcc0000 },
    { name: 'Yellow', hex: 0xffcc00 },
    { name: 'Blue',   hex: 0x0055bb },
    { name: 'Green',  hex: 0x237841 },
    { name: 'White',  hex: 0xf0f0f0 },
    { name: 'Black',  hex: 0x111111 },
    { name: 'Orange', hex: 0xff6600 },
    { name: 'Lime',   hex: 0x73b500 },
  ];

  // ── RENDERER ────────────────────────────────────────────────────────────────
  const renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.appendChild(renderer.domElement);

  // ── SCENE ───────────────────────────────────────────────────────────────────
  const scene = new THREE.Scene();
  scene.background = new THREE.Color(0x1a1a2e);
  scene.fog = new THREE.Fog(0x1a1a2e, 70, 130);

  const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
  camera.position.set(0, 22, 36);
  camera.lookAt(0, 0, 0);

  // Lights
  scene.add(new THREE.AmbientLight(0xffffff, 0.5));

  const sun = new THREE.DirectionalLight(0xffffff, 0.85);
  sun.position.set(12, 28, 18);
  sun.castShadow = true;
  sun.shadow.mapSize.set(2048, 2048);
  sun.shadow.camera.left   = -40;
  sun.shadow.camera.right  =  40;
  sun.shadow.camera.top    =  40;
  sun.shadow.camera.bottom = -40;
  sun.shadow.camera.near   =  1;
  sun.shadow.camera.far    =  110;
  scene.add(sun);

  scene.add(new THREE.HemisphereLight(0xffeedd, 0x334466, 0.4));

  // Base plate
  const PLATE_W   = PLATE_HALF * 2 * STUD_SPACING;
  const basePlate = new THREE.Mesh(
    new THREE.BoxGeometry(PLATE_W, 1, PLATE_W),
    new THREE.MeshLambertMaterial({ color: 0x2d8a2d })
  );
  basePlate.position.y = -0.5;
  basePlate.receiveShadow = true;
  basePlate.userData.isBase = true;
  scene.add(basePlate);

  // Subtle grid on plate surface
  const grid = new THREE.GridHelper(PLATE_W, PLATE_HALF * 2, 0x1f6b1f, 0x1f6b1f);
  grid.position.y = 0.005;
  scene.add(grid);

  // OrbitControls
  const controls = new THREE.OrbitControls(camera, renderer.domElement);
  controls.enableDamping = true;
  controls.dampingFactor = 0.07;
  controls.minDistance   = 3;
  controls.maxDistance   = 90;
  controls.maxPolarAngle = Math.PI * 0.48;
  controls.mouseButtons  = { LEFT: THREE.MOUSE.ROTATE, MIDDLE: THREE.MOUSE.DOLLY, RIGHT: THREE.MOUSE.PAN };

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  // ── GEOMETRY FACTORY ────────────────────────────────────────────────────────
  // Cached merged geometries (box body + stud cylinders). Cloned per brick so
  // each brick can be independently disposed without affecting others.
  const geoCache = new Map();

  function getBrickGeo(cols, rows) {
    const key = cols + 'x' + rows;
    if (!geoCache.has(key)) {
      const bW   = cols * STUD_SPACING - WALL_INSET * 2;
      const bD   = rows * STUD_SPACING - WALL_INSET * 2;
      const body = new THREE.BoxGeometry(bW, BRICK_HEIGHT, bD);
      // Shift so local Y=0 is the bottom face of the brick body
      body.translate(0, BRICK_HEIGHT / 2, 0);

      const geos = [body];
      for (var c = 0; c < cols; c++) {
        for (var r = 0; r < rows; r++) {
          var cyl = new THREE.CylinderGeometry(STUD_RADIUS, STUD_RADIUS, STUD_HEIGHT, 16);
          var lx  = (c - (cols - 1) / 2) * STUD_SPACING;
          var lz  = (r - (rows - 1) / 2) * STUD_SPACING;
          cyl.translate(lx, BRICK_HEIGHT + STUD_HEIGHT / 2, lz);
          geos.push(cyl);
        }
      }
      var merged = THREE.BufferGeometryUtils.mergeBufferGeometries(geos);
      merged.computeVertexNormals();
      geoCache.set(key, merged);
    }
    return geoCache.get(key).clone();
  }

  // ── BRICK DATA ───────────────────────────────────────────────────────────────
  //  gx, gz  = bottom-left stud grid coordinates (integers)
  //  gy      = vertical layer (0 = on base plate)
  //  Mesh world position: x/z center of footprint, y at bottom face world Y
  var _nextId     = 0;
  var brickMap    = new Map();   // id -> brick
  var studGrid    = new Map();   // "gx,gy,gz" -> brick id
  var brickMeshes = [];          // for raycasting

  function studKey(gx, gy, gz) { return gx + ',' + gy + ',' + gz; }

  function brickStuds(b) {
    var arr = [];
    for (var c = 0; c < b.cols; c++)
      for (var r = 0; r < b.rows; r++)
        arr.push([b.gx + c, b.gy, b.gz + r]);
    return arr;
  }

  function brickWorldPos(cols, rows, gx, gy, gz) {
    return new THREE.Vector3(
      (gx + (cols - 1) / 2) * STUD_SPACING,
      gy * BRICK_HEIGHT,
      (gz + (rows - 1) / 2) * STUD_SPACING
    );
  }

  function addBrick(cols, rows, color, gx, gy, gz) {
    var id   = _nextId++;
    var geo  = getBrickGeo(cols, rows);
    var mat  = new THREE.MeshLambertMaterial({ color: color });
    var mesh = new THREE.Mesh(geo, mat);
    mesh.castShadow    = true;
    mesh.receiveShadow = true;
    mesh.userData.brickId = id;
    mesh.position.copy(brickWorldPos(cols, rows, gx, gy, gz));
    scene.add(mesh);

    var brick = { id: id, cols: cols, rows: rows, color: color, gx: gx, gy: gy, gz: gz, mesh: mesh };
    brickMap.set(id, brick);
    brickMeshes.push(mesh);
    brickStuds(brick).forEach(function(s) { studGrid.set(studKey(s[0], s[1], s[2]), id); });
    return brick;
  }

  function removeBrick(brick) {
    if (!brick) return;
    brickStuds(brick).forEach(function(s) { studGrid.delete(studKey(s[0], s[1], s[2])); });
    brickMap.delete(brick.id);
    var mi = brickMeshes.indexOf(brick.mesh);
    if (mi >= 0) brickMeshes.splice(mi, 1);
    scene.remove(brick.mesh);
    brick.mesh.geometry.dispose();
    brick.mesh.material.dispose();
  }

  function clearAll() {
    Array.from(brickMap.values()).forEach(removeBrick);
  }

  // ── SNAP ENGINE ──────────────────────────────────────────────────────────────
  // A placement is valid when:
  //   1. All stud cells at layer gy are unoccupied.
  //   2. At least one stud has support below (gy-1 occupied) OR gy===0.
  //   3. All studs are within base plate bounds.
  function isValid(cols, rows, gx, gy, gz) {
    if (gy < 0) return false;
    if (gx < -PLATE_HALF || gx + cols > PLATE_HALF) return false;
    if (gz < -PLATE_HALF || gz + rows > PLATE_HALF) return false;

    var hasSupport = (gy === 0);
    for (var c = 0; c < cols; c++) {
      for (var r = 0; r < rows; r++) {
        if (studGrid.has(studKey(gx + c, gy, gz + r))) return false; // overlap
        if (!hasSupport && gy > 0 && studGrid.has(studKey(gx + c, gy - 1, gz + r)))
          hasSupport = true;
      }
    }
    return hasSupport;
  }

  // Returns {gx, gy, gz} of best snap position, or null.
  // Tries all (cols x rows) offsets so any stud can land under the cursor.
  function findSnap(hitPoint, hitMesh, cols, rows) {
    var gy = 0;
    if (hitMesh && !hitMesh.userData.isBase) {
      var hitId = hitMesh.userData.brickId;
      if (hitId !== undefined) {
        var hb = brickMap.get(hitId);
        if (hb) gy = hb.gy + 1;
      }
    }

    var nearX = Math.round(hitPoint.x / STUD_SPACING);
    var nearZ = Math.round(hitPoint.z / STUD_SPACING);

    var best = null, bestDSq = Infinity;
    for (var dc = 0; dc < cols; dc++) {
      for (var dr = 0; dr < rows; dr++) {
        var gx = nearX - dc;
        var gz = nearZ - dr;
        if (isValid(cols, rows, gx, gy, gz)) {
          var cx  = (gx + (cols - 1) / 2) * STUD_SPACING;
          var cz  = (gz + (rows - 1) / 2) * STUD_SPACING;
          var dSq = (hitPoint.x - cx) * (hitPoint.x - cx) + (hitPoint.z - cz) * (hitPoint.z - cz);
          if (dSq < bestDSq) { bestDSq = dSq; best = { gx: gx, gy: gy, gz: gz }; }
        }
      }
    }
    return best;
  }

  // ── GHOST BRICK ──────────────────────────────────────────────────────────────
  var gCols = 2, gRows = 4;
  var activeColor = LEGO_COLORS[0].hex;

  var ghostMat = new THREE.MeshLambertMaterial({
    color: activeColor, transparent: true, opacity: 0.38, depthWrite: false,
  });
  var ghost = new THREE.Mesh(getBrickGeo(gCols, gRows), ghostMat);
  ghost.visible = false;
  scene.add(ghost);

  var snap = null;

  function rebuildGhost(cols, rows) {
    gCols = cols; gRows = rows;
    scene.remove(ghost);
    ghost.geometry.dispose();
    ghost = new THREE.Mesh(getBrickGeo(cols, rows), ghostMat);
    ghost.visible = false;
    scene.add(ghost);
    snap = null;
  }

  function refreshGhost(hitPoint, hitMesh) {
    snap = findSnap(hitPoint, hitMesh, gCols, gRows);
    if (snap) {
      ghost.position.copy(brickWorldPos(gCols, gRows, snap.gx, snap.gy, snap.gz));
      ghostMat.color.setHex(activeColor);
      ghost.visible = true;
    } else {
      ghost.visible = false;
    }
  }

  // ── RAYCASTING ───────────────────────────────────────────────────────────────
  var raycaster = new THREE.Raycaster();
  var ndcMouse  = new THREE.Vector2();

  function toNDC(clientX, clientY) {
    return new THREE.Vector2(
      (clientX / window.innerWidth) * 2 - 1,
      -(clientY / window.innerHeight) * 2 + 1
    );
  }

  function rayHit(ndc, bricksOnly) {
    raycaster.setFromCamera(ndc, camera);
    var targets = bricksOnly ? brickMeshes : [basePlate].concat(brickMeshes);
    var hits    = raycaster.intersectObjects(targets);
    return hits.length ? hits[0] : null;
  }

  // ── INPUT ────────────────────────────────────────────────────────────────────
  var pStart = null, pMoved = false;

  renderer.domElement.addEventListener('pointermove', function(e) {
    var ndc = toNDC(e.clientX, e.clientY);
    ndcMouse.copy(ndc);

    if (pStart) {
      var dx = e.clientX - pStart.x, dy = e.clientY - pStart.y;
      if (Math.sqrt(dx * dx + dy * dy) > CLICK_THRESH) pMoved = true;
    }

    // Hide ghost while orbit-dragging so it does not float around distractingly
    if (e.buttons === 1 && pMoved) { ghost.visible = false; return; }
    // Skip ghost update during right/middle drag (pan / dolly)
    if (e.buttons === 2 || e.buttons === 4) return;

    var hit = rayHit(ndc, false);
    if (hit) refreshGhost(hit.point, hit.object);
    else { ghost.visible = false; snap = null; }
  });

  renderer.domElement.addEventListener('pointerdown', function(e) {
    pStart = { x: e.clientX, y: e.clientY };
    pMoved = false;
  });

  renderer.domElement.addEventListener('pointerup', function(e) {
    if (!pStart) return;
    var moved = pMoved;
    pStart = null; pMoved = false;

    if (e.button === 0 && !moved && snap) {
      addBrick(gCols, gRows, activeColor, snap.gx, snap.gy, snap.gz);
      var hit = rayHit(ndcMouse, false);
      if (hit) refreshGhost(hit.point, hit.object);
      else { ghost.visible = false; snap = null; }
    }
  });

  renderer.domElement.addEventListener('contextmenu', function(e) {
    e.preventDefault();
    var ndc = toNDC(e.clientX, e.clientY);
    var hit = rayHit(ndc, true);
    if (hit) {
      var id    = hit.object.userData.brickId;
      var brick = brickMap.get(id);
      if (brick) {
        removeBrick(brick);
        var h2 = rayHit(ndc, false);
        if (h2) refreshGhost(h2.point, h2.object);
        else { ghost.visible = false; snap = null; }
      }
    }
  });

  // ── UI ───────────────────────────────────────────────────────────────────────
  var sizeBar = document.getElementById('sizeBar');
  BRICK_SIZES.forEach(function(s, i) {
    var btn = document.createElement('button');
    btn.className = 'size-btn' + (i === 5 ? ' active' : '');
    btn.textContent = s.label;
    btn.addEventListener('click', function() {
      sizeBar.querySelectorAll('.size-btn').forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      rebuildGhost(s.cols, s.rows);
    });
    sizeBar.appendChild(btn);
  });

  var colorBar = document.getElementById('colorBar');
  LEGO_COLORS.forEach(function(c, i) {
    var sw = document.createElement('div');
    sw.className = 'color-sw' + (i === 0 ? ' active' : '');
    sw.style.background = '#' + c.hex.toString(16).padStart(6, '0');
    sw.title = c.name;
    sw.addEventListener('click', function() {
      colorBar.querySelectorAll('.color-sw').forEach(function(s) { s.classList.remove('active'); });
      sw.classList.add('active');
      activeColor = c.hex;
      ghostMat.color.setHex(activeColor);
    });
    colorBar.appendChild(sw);
  });

  document.getElementById('clearBtn').addEventListener('click', function() {
    clearAll();
    ghost.visible = false;
    snap = null;
  });

  // ── RENDER LOOP ──────────────────────────────────────────────────────────────
  (function tick() {
    requestAnimationFrame(tick);
    controls.update();
    renderer.render(scene, camera);
  })();

})();
</script>
</body>
</html>
